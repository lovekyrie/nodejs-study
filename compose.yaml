services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nodejs-study
      POSTGRES_PASSWORD: nodejs-study
      POSTGRES_DB: nodejs_study
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodejs-study -d nodejs_study"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
